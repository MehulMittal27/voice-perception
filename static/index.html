<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voice Perception Service</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #151b2e;
      --panel-soft: #1d2540;
      --text: #f4f7fb;
      --muted: #93a0b8;
      --green: #1fd17f;
      --yellow: #f7c948;
      --red: #ff5c7a;
      --blue: #62a8ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #1d3765 0, transparent 32rem), var(--bg);
      color: var(--text);
    }
    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 40px 0;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 28px;
    }
    h1 { margin: 0 0 8px; font-size: clamp(2rem, 5vw, 4rem); letter-spacing: -0.04em; }
    p { margin: 0; color: var(--muted); }
    button {
      border: 0;
      border-radius: 999px;
      padding: 20px 36px;
      min-width: 180px;
      font-size: 1.15rem;
      font-weight: 800;
      color: #05101a;
      background: linear-gradient(135deg, var(--green), #86efac);
      box-shadow: 0 18px 50px rgba(31, 209, 127, 0.28);
      cursor: pointer;
      transition: transform 160ms ease, opacity 160ms ease, background 160ms ease;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.55; cursor: wait; }
    button.stop {
      color: #fff;
      background: linear-gradient(135deg, var(--red), #ff8fab);
      box-shadow: 0 18px 50px rgba(255, 92, 122, 0.28);
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255,255,255,0.05);
      font-weight: 700;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #657089; }
    .status.live .dot { background: var(--green); box-shadow: 0 0 0 8px rgba(31,209,127,0.12); }
    .status.error .dot { background: var(--red); box-shadow: 0 0 0 8px rgba(255,92,122,0.12); }
    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
    }
    .card {
      min-height: 180px;
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.035));
      box-shadow: 0 24px 80px rgba(0,0,0,0.25);
      backdrop-filter: blur(18px);
    }
    .card h2 {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .transcript {
      min-height: 170px;
      font-size: clamp(1.35rem, 3vw, 2.3rem);
      line-height: 1.25;
      color: #ffffff;
    }
    .emotion-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 210px;
      padding: 20px 24px;
      border-radius: 999px;
      background: var(--panel-soft);
      color: #ffffff;
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 0.02em;
      transition: background 180ms ease, transform 180ms ease;
    }
    .pill.pop { transform: scale(1.03); }
    .confidence { color: var(--muted); font-weight: 800; }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(98,168,255,0.18);
      color: #d6e8ff;
      font-weight: 800;
    }
    .meter-wrap {
      height: 42px;
      overflow: hidden;
      border-radius: 999px;
      background: #26304d;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .meter {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: var(--green);
      transition: width 260ms ease, background 260ms ease;
    }
    .score-line {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      color: var(--muted);
      font-weight: 800;
    }
    pre {
      min-height: 260px;
      max-height: 360px;
      overflow: auto;
      margin: 0;
      padding: 18px;
      border-radius: 18px;
      background: #050814;
      color: #b7c8ff;
      font-size: 0.88rem;
      line-height: 1.45;
    }
    .muted { color: var(--muted); }
    .full { grid-column: 1 / -1; }
    @media (max-width: 820px) {
      header { align-items: flex-start; flex-direction: column; }
      .grid { grid-template-columns: 1fr; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Voice Perception</h1>
        <p>Speak calmly, then anxiously. Watch emotion and hesitation update live.</p>
      </div>
      <button id="toggleButton" type="button">Start</button>
    </header>

    <div class="status" id="status"><span class="dot"></span><span id="statusText">Idle</span></div>

    <section class="grid" aria-live="polite">
      <article class="card full">
        <h2>Live transcript</h2>
        <div class="transcript" id="transcript"><span class="muted">Waiting for speech...</span></div>
      </article>

      <article class="card">
        <h2>Emotion</h2>
        <div class="emotion-row">
          <div class="pill" id="emotionPill">NEUTRAL</div>
          <div class="confidence" id="confidence">confidence 0.00</div>
        </div>
        <h2 style="margin-top: 28px;">Audio events</h2>
        <div class="tags" id="events"><span class="muted">None yet</span></div>
      </article>

      <article class="card">
        <h2>Hesitation score</h2>
        <div class="meter-wrap"><div class="meter" id="meter"></div></div>
        <div class="score-line"><span>calm</span><span id="scoreText">0.00</span><span>high</span></div>
      </article>

      <article class="card full">
        <h2>Raw state JSON</h2>
        <pre id="rawJson">{}</pre>
      </article>
    </section>
  </main>

  <script>
    const toggleButton = document.getElementById('toggleButton');
    const statusEl = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    const transcriptEl = document.getElementById('transcript');
    const emotionPill = document.getElementById('emotionPill');
    const confidenceEl = document.getElementById('confidence');
    const eventsEl = document.getElementById('events');
    const meterEl = document.getElementById('meter');
    const scoreText = document.getElementById('scoreText');
    const rawJson = document.getElementById('rawJson');

    let sessionId = null;
    let socket = null;
    let recorder = null;
    let mediaStream = null;
    let pollTimer = null;
    let running = false;

    toggleButton.addEventListener('click', () => {
      if (running) {
        stopSession();
      } else {
        startSession();
      }
    });

    window.addEventListener('beforeunload', () => {
      if (sessionId) {
        navigator.sendBeacon(`/session/${sessionId}/end`, new Blob([], { type: 'application/json' }));
      }
    });

    async function startSession() {
      setBusy(true);
      try {
        setStatus('Connecting', '');
        const session = await postJson('/session/start', {});
        sessionId = session.session_id;
        socket = await openSocket(sessionId);
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorder = createRecorder(mediaStream);
        recorder.ondataavailable = sendChunk;
        recorder.start(1000);
        pollTimer = window.setInterval(pollState, 300);
        running = true;
        toggleButton.textContent = 'Stop';
        toggleButton.classList.add('stop');
        setStatus('Live', 'live');
      } catch (error) {
        console.error(error);
        setStatus(error.message || String(error), 'error');
        await stopSession();
      } finally {
        setBusy(false);
      }
    }

    async function stopSession() {
      setBusy(true);
      running = false;
      window.clearInterval(pollTimer);
      pollTimer = null;
      if (recorder && recorder.state !== 'inactive') recorder.stop();
      if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
      if (socket && socket.readyState <= WebSocket.OPEN) socket.close();
      if (sessionId) await fetch(`/session/${sessionId}/end`, { method: 'POST' }).catch(() => {});
      recorder = null;
      mediaStream = null;
      socket = null;
      sessionId = null;
      toggleButton.textContent = 'Start';
      toggleButton.classList.remove('stop');
      setStatus('Idle', '');
      setBusy(false);
    }

    async function sendChunk(event) {
      if (!event.data || event.data.size === 0) return;
      if (!socket || socket.readyState !== WebSocket.OPEN) return;
      socket.send(await event.data.arrayBuffer());
    }

    function createRecorder(stream) {
      if (!window.MediaRecorder) throw new Error('MediaRecorder is not supported in this browser');
      const mimeType = chooseMimeType();
      return mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
    }

    function chooseMimeType() {
      const candidates = ['audio/webm;codecs=opus', 'audio/webm'];
      for (const type of candidates) {
        if (MediaRecorder.isTypeSupported(type)) return type;
      }
      return '';
    }

    function openSocket(id) {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${protocol}//${window.location.host}/audio/${id}`);
      ws.onmessage = event => console.debug('ack', event.data);
      ws.onerror = () => setStatus('WebSocket error', 'error');
      return new Promise((resolve, reject) => {
        ws.onopen = () => resolve(ws);
        ws.onclose = event => {
          if (!running) return;
          reject(new Error(`WebSocket closed ${event.code}`));
        };
      });
    }

    async function pollState() {
      if (!sessionId) return;
      const state = await fetchJson(`/state/${sessionId}`).catch(error => {
        setStatus(error.message || String(error), 'error');
        return null;
      });
      if (state) updateUi(state);
    }

    function updateUi(state) {
      rawJson.textContent = JSON.stringify(state, null, 2);
      transcriptEl.textContent = state.transcript_partial || 'Listening...';
      const emotion = state.emotion || 'NEUTRAL';
      emotionPill.textContent = emotion;
      emotionPill.style.background = emotionColor(emotion);
      emotionPill.classList.add('pop');
      window.setTimeout(() => emotionPill.classList.remove('pop'), 180);
      confidenceEl.textContent = `confidence ${Number(state.emotion_confidence || 0).toFixed(2)}`;
      eventsEl.innerHTML = '';
      const events = state.events || [];
      if (events.length === 0) {
        eventsEl.innerHTML = '<span class="muted">None</span>';
      } else {
        for (const eventName of events) {
          const tag = document.createElement('span');
          tag.className = 'tag';
          tag.textContent = eventName;
          eventsEl.appendChild(tag);
        }
      }
      const score = clamp(Number(state.hesitation_score || 0), 0, 1);
      meterEl.style.width = `${score * 100}%`;
      meterEl.style.background = `hsl(${120 - score * 120}, 82%, 48%)`;
      scoreText.textContent = score.toFixed(2);
    }

    function emotionColor(emotion) {
      const colors = {
        HAPPY: '#19c37d',
        NEUTRAL: '#60718f',
        SURPRISED: '#f7c948',
        SAD: '#5e8cff',
        ANGRY: '#ff6b35',
        DISGUSTED: '#9d6bff',
        FEARFUL: '#ff4d7d'
      };
      return colors[emotion] || '#60718f';
    }

    async function postJson(url, body) {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!response.ok) throw new Error(`${url} ${response.status}`);
      return response.json();
    }

    async function fetchJson(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error(`${url} ${response.status}`);
      return response.json();
    }

    function setStatus(text, mode) {
      statusText.textContent = text;
      statusEl.className = `status ${mode || ''}`;
    }

    function setBusy(isBusy) {
      toggleButton.disabled = isBusy;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }
  </script>
</body>
</html>
